# Fosnie release — build + push the two application images to GHCR and attach the
# deploy assets to the GitHub Release. DORMANT until the repo is published (no tag
# is pushed before then). Zero secrets in the repo: GHCR auth uses the built-in
# GITHUB_TOKEN.
#
# Build context is the repo root; the Dockerfiles are backend/Dockerfile and
# ml/Dockerfile. Migrations are embedded in the backend binary (run on boot).
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write   # attach assets to the Release
  packages: write   # push to GHCR

jobs:
  # Gate. The frontend suite includes structural guards that a review cannot
  # reliably catch by eye — every request going through one layer, no credential
  # leaving it — so they have to be machine-enforced or they decay. Typechecking
  # is not repeated here: the image build runs `npm run build` (tsc -b) inside
  # backend/Dockerfile and fails on a type error anyway. Interim measure until a
  # full CI workflow lands with publication; nothing ships past a red suite.
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # `npm install`, not `npm ci`: the committed lockfile is generated on
      # Windows and omits linux-only optional deps (see backend/Dockerfile).
      - run: npm install --no-audit --no-fund
        working-directory: frontend
      - run: npm test
        working-directory: frontend

  # The wire format, checked on its own. The server and the installed client are
  # released separately and meet at whatever versions a user happens to have, so
  # the frame snapshots are the one thing that must not move quietly. No database
  # and no toolchain beyond stable Rust: seconds, not minutes.
  protocol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
        working-directory: crates/fosnie-protocol

  # The installable client. Built from the same frontend the images build, so the
  # interface cannot drift between the two.
  #
  # Artefacts only: nothing here is attached to the Release. An unsigned
  # application that connects to a company's systems and runs in the background is
  # the exact shape endpoint protection exists to stop, so an unsigned build goes
  # to testers by hand and no further. Signing is switched on by the Azure
  # secrets appearing (see desktop/docs/updater-keys.md); until then the Windows
  # job says in its summary that what it produced is not publishable.
  desktop:
    needs: [checks, protocol]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: desktop-windows
          - os: macos-latest
            artifact: desktop-macos
    runs-on: ${{ matrix.os }}
    # Resolved here because the secrets context cannot be read from a step's `if`.
    env:
      SIGNING_CONFIGURED: ${{ secrets.AZURE_SIGNING_ACCOUNT != '' }}
      UPDATER_KEY_CONFIGURED: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # `npm install`, not `npm ci`: the committed lockfile is generated on
      # Windows and omits linux-only optional deps (see backend/Dockerfile).
      - run: npm install --no-audit --no-fund
        working-directory: frontend
      - run: npm install --no-audit --no-fund
        working-directory: desktop

      # An update artefact is signed as it is produced, so a build that is asked
      # for one without a key fails outright — the installer is written and the
      # command still exits non-zero. Two builds rather than one flag: with the
      # key, the full release; without it, the same client minus the update
      # artefact it could not sign.
      - name: Build the client
        if: env.UPDATER_KEY_CONFIGURED == 'true'
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run build

      - name: Build the client (no update artefact, no signing key here)
        if: env.UPDATER_KEY_CONFIGURED != 'true'
        working-directory: desktop
        run: npm run build:unsigned

      # Signs the installer once the Trusted Signing account exists. UNPROVEN
      # until then: it has never run with real credentials, so the first signed
      # release must be checked by hand (signature present, SmartScreen
      # behaviour) before it is published. See desktop/docs/updater-keys.md.
      - name: Sign the installer
        if: matrix.os == 'windows-latest' && env.SIGNING_CONFIGURED == 'true'
        uses: azure/trusted-signing-action@v0.5.1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_SIGNING_PROFILE }}
          files-folder: desktop/src-tauri/target/release/bundle/msi
          files-folder-filter: msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Say whether this build can be published
        if: matrix.os == 'windows-latest' && env.SIGNING_CONFIGURED != 'true'
        shell: bash
        run: |
          echo "### Desktop client: UNSIGNED" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Code signing is not configured, so this installer is for testing only and must not be published. See desktop/docs/updater-keys.md." >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            desktop/src-tauri/target/release/bundle/msi/*
            desktop/src-tauri/target/release/bundle/dmg/*
            desktop/src-tauri/target/release/bundle/macos/*

  images:
    needs: checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            image: fosnie-backend
            dockerfile: backend/Dockerfile
          - name: ml
            image: fosnie-ml
            dockerfile: ml/Dockerfile
    steps:
      - uses: actions/checkout@v4

      # arm64 for the Python ml image is cheap. NOTE: the Rust backend under QEMU
      # arm64 is SLOW (30+ min); if that bites, either add native arm64 runners or
      # cross-compile aarch64-unknown-linux-gnu in backend/Dockerfile and keep this
      # single-arch. Left multi-arch here for correctness; optimise when it hurts.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

  release-assets:
    needs: images
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Attach deploy assets to the Release
        uses: softprops/action-gh-release@v2
        with:
          # The curated release notes, written into this same tagged commit by the
          # release process; without it the Release body falls back to a raw commit list.
          body_path: .changes/release-notes.md
          files: |
            backend/deploy/docker-compose.yml
            backend/deploy/example.env
            backend/deploy/install.sh
            backend/deploy/install.ps1
