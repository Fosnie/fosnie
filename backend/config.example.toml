# Optional boot config file (figment layer: defaults → this file → PAI__ env).
# Point at it with PAI_CONFIG_FILE; env vars override anything set here.
# Secrets belong in env, not in a committed file.

log_level = "info"

[server]
host = "0.0.0.0"
port = 8080
static_dir = "../frontend/dist"

[scheduler]
worker_threads = 2
poll_interval_secs = 5
batch_size = 10
